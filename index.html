<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パン屋 在庫・レシピ管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif; background: #fafaf8; color: #1a1a1a; min-height: 100vh; }
.container { max-width: 680px; margin: 0 auto; padding: 1rem; }
h1 { font-size: 18px; font-weight: 600; padding: 1rem 0 0.5rem; color: #3a2a1a; letter-spacing: 0.03em; }
.tabs { display: flex; gap: 4px; border-bottom: 1px solid #e8e0d8; margin-bottom: 1.25rem; margin-top: 0.5rem; }
.tab { padding: 8px 16px; font-size: 13px; border: none; background: none; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; }
.tab.active { color: #3a2a1a; border-bottom-color: #3a2a1a; font-weight: 500; }
.section { display: none; }
.section.active { display: block; }
.card { background: #fff; border: 1px solid #ede8e0; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.metric { background: #f5f0e8; border-radius: 10px; padding: 0.875rem; }
.metric-num { font-size: 26px; font-weight: 600; color: #3a2a1a; }
.metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
.badge-ok { background: #e6f4ea; color: #2e7d32; }
.badge-low { background: #fff3e0; color: #e65100; }
.badge-out { background: #fde8e8; color: #c62828; }
.progress-bar { flex: 1; height: 6px; background: #eee; border-radius: 999px; overflow: hidden; min-width: 40px; }
.progress-fill { height: 100%; border-radius: 999px; }
.progress-ok { background: #4caf50; }
.progress-low { background: #ff9800; }
.progress-out { background: #e53935; }
.btn { background: none; border: 1px solid #d0c8be; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; color: #3a2a1a; display: inline-flex; align-items: center; gap: 5px; font-family: inherit; }
.btn:hover { background: #f5f0e8; }
.btn-primary { background: #3a2a1a; color: #fff; border-color: #3a2a1a; }
.btn-primary:hover { background: #2a1a0a; }
.btn-danger { background: #fde8e8; color: #c62828; border-color: #e57373; font-size: 12px; padding: 4px 10px; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field label { font-size: 11px; color: #888; }
.field input { font-size: 13px; padding: 7px 9px; border: 1px solid #d0c8be; border-radius: 8px; background: #fff; color: #1a1a1a; font-family: inherit; }
.field input:focus { outline: none; border-color: #8a6a4a; }
.input-row { display: flex; gap: 8px; margin-bottom: 1rem; align-items: flex-end; flex-wrap: wrap; }
.qty-ctrl { display: flex; align-items: center; gap: 6px; }
.qty-btn { background: none; border: 1px solid #d0c8be; border-radius: 7px; width: 28px; height: 28px; font-size: 16px; cursor: pointer; color: #3a2a1a; display: flex; align-items: center; justify-content: center; font-family: inherit; }
.qty-btn:hover { background: #f5f0e8; }
.qty-input { font-size: 13px; font-weight: 500; width: 90px; text-align: center; padding: 5px 6px; border: 1px solid #d0c8be; border-radius: 8px; background: #fff; color: #1a1a1a; font-family: inherit; }
.empty-state { text-align: center; color: #aaa; font-size: 14px; padding: 2.5rem 1rem; }
.recipe-body { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #ede8e0; }
.recipe-body.open { display: block; }
.ing-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 10px; table-layout: fixed; }
.ing-table th { text-align: left; color: #888; font-weight: 400; padding: 4px 6px; border-bottom: 1px solid #ede8e0; font-size: 12px; }
.ing-table td { padding: 6px; border-bottom: 1px solid #ede8e0; word-break: break-word; }
.section-note { font-size: 12px; color: #888; margin-bottom: 12px; background: #f5f0e8; padding: 8px 12px; border-radius: 8px; line-height: 1.6; }
.shop-card { background: #fff; border: 1px solid #ede8e0; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
.link-btn { background: none; border: 1px solid #d0c8be; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; color: #3a2a1a; display: inline-flex; align-items: center; gap: 4px; font-family: inherit; text-decoration: none; }
.link-btn:hover { background: #f5f0e8; }
.sync-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #888; margin-bottom: 12px; padding: 7px 12px; background: #f5f0e8; border-radius: 8px; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
.sync-dot.ok { background: #4caf50; }
.sync-dot.err { background: #e53935; }
.sync-dot.loading { background: #ff9800; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #3a2a1a; color: #fff; font-size: 13px; padding: 9px 20px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; white-space: nowrap; font-family: inherit; }
.toast.show { opacity: 1; }

/* 変更点3：レシピ編集部と製作部の色分け・デザイン */
.recipe-edit-area { background: #fffdfa; padding: 12px; border: 1px solid #f0eae1; border-radius: 8px; margin-bottom: 12px; }
.recipe-prod-area { background: #f4f6f8; padding: 12px; border: 1px dashed #d0d7de; border-radius: 8px; }
.calc-list { list-style: none; margin-top: 12px; border-top: 1px solid #d0d7de; padding-top: 4px; }
.calc-list li { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px; border-bottom: 1px solid #e1e7ec; font-size: 14px; }
.calc-list li:last-child { border-bottom: none; }
.calc-list li strong { font-weight: 600; font-size: 15px; color: #1a1a1a; }
.calc-list li span { color: #3a2a1a; }
</style>
</head>
<body>
<div class="container">
  <h1>🍞 パン屋 在庫・レシピ管理</h1>
  <div class="tabs">
    <button class="tab active" onclick="showTab('inventory')">📦 在庫</button>
    <button class="tab" onclick="showTab('recipes')">📖 レシピ</button>
    <button class="tab" onclick="showTab('shop')">🛒 購入リスト</button>
  </div>
  <div class="sync-bar">
    <div class="sync-dot loading" id="sync-dot"></div>
    <span id="sync-status">Firebaseに接続中…</span>
  </div>
  
  <div id="inventory" class="section active">
    <div class="grid2">
      <div class="metric"><div class="metric-label">総材料数</div><div class="metric-num" id="total-count">0</div></div>
      <div class="metric"><div class="metric-label">要補充</div><div class="metric-num" id="low-count" style="color:#e65100">0</div></div>
    </div>
    <div class="input-row">
      <div class="field"><label>材料名</label><input id="new-name" type="text" placeholder="強力粉" style="width:90px" /></div>
      <div class="field"><label>在庫量(g)</label><input id="new-qty" type="number" placeholder="1000" style="width:70px" min="0" step="0.001" /></div>
      <div class="field"><label>最低量(g)</label><input id="new-min" type="number" placeholder="500" style="width:70px" min="0" step="0.001" /></div>
      <div class="field"><label>購入URL (任意)</label><input id="new-url" type="text" placeholder="https://..." style="width:110px" /></div>
      <div class="field"><label>&nbsp;</label><button class="btn btn-primary" id="add-ing-btn">＋ 追加</button></div>
    </div>
    <div id="inventory-list"></div>
  </div>

  <div id="recipes" class="section">
    <div class="section-note">粉量を基準にベーカーズ%で材料比率を設定できます。「水」は常に在庫無限として扱われます。</div>
    <div class="input-row">
      <div class="field"><label>レシピ名</label><input id="recipe-name" type="text" placeholder="食パン" style="width:130px" /></div>
      <div class="field"><label>基準粉量(g)</label><input id="recipe-flour" type="number" placeholder="100" style="width:95px" min="0.001" step="0.001" value="100" /></div>
      <div class="field"><label>&nbsp;</label><button class="btn btn-primary" id="add-rec-btn">＋ レシピ追加</button></div>
    </div>
    <div id="recipe-list"></div>
  </div>

  <div id="shop" class="section">
    <div class="section-note">在庫が最低量を下回っている材料と、登録した購入先リンクの一覧です。</div>
    <div id="shop-list"></div>
    <button class="btn" style="margin-top:8px;" id="copy-shop-btn">📋 リストをコピー</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDYeTv14IRtpTCVrjcnk7I0wF-KCYoP0Os",
  authDomain: "bakery-53ea7.firebaseapp.com",
  projectId: "bakery-53ea7",
  storageBucket: "bakery-53ea7.firebasestorage.app",
  messagingSenderId: "212598766314",
  appId: "1:212598766314:web:86bef18fac3396e4c2b593"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const DOC_REF = doc(db, 'bakery', 'data');
let state = { ingredients: [], recipes: [] };
let saving = false;

function fmt(n) {
  const num = parseFloat(n);
  if (isNaN(num) || num === 0) return '0';
  if (Number.isInteger(num)) return num.toString();
  return num.toPrecision(6).replace(/\.?0+$/, '');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function setSyncStatus(status, msg) {
  document.getElementById('sync-dot').className = 'sync-dot ' + status;
  document.getElementById('sync-status').textContent = msg;
}
async function saveState() {
  if (saving) return; saving = true;
  setSyncStatus('loading', '保存中…');
  try { await setDoc(DOC_REF, state); setSyncStatus('ok', 'Firebaseに保存済み ✓'); }
  catch(e) { setSyncStatus('err', '保存エラー'); showToast('保存に失敗しました: ' + e.message); }
  saving = false;
}
window.showTab = function(id) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['inventory','recipes','shop'][i]===id));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id==='shop') renderShop();
};
function getStatus(qty, min) {
  if (qty<=0) return 'out';
  if (min>0 && qty<=min) return 'low';
  return 'ok';
}

function renderInventory() {
  const total = state.ingredients.length;
  const low = state.ingredients.filter(i=>getStatus(i.qty,i.min)!=='ok').length;
  document.getElementById('total-count').textContent = total;
  document.getElementById('low-count').textContent = low;
  const list = document.getElementById('inventory-list');
  list.innerHTML = '';
  if (!total) { list.innerHTML='<div class="empty-state">材料を追加してください</div>'; return; }
  state.ingredients.forEach((ing, idx) => {
    const s = getStatus(ing.qty, ing.min);
    const pct = ing.min>0 ? Math.min(100,Math.round(ing.qty/ing.min*100)) : 100;
    const labels = {ok:'十分',low:'少ない',out:'在庫なし'};
    const card = document.createElement('div'); card.className='card';
    const top = document.createElement('div'); top.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;';
    const nameSpan = document.createElement('span'); nameSpan.style.cssText='font-weight:500;font-size:14px;'; nameSpan.textContent=ing.name;
    const rDiv = document.createElement('div'); rDiv.style.cssText='display:flex;align-items:center;gap:8px;';
    const badge = document.createElement('span'); badge.className=`badge badge-${s}`; badge.textContent=labels[s];
    const delBtn = document.createElement('button'); delBtn.className='btn btn-danger'; delBtn.textContent='削除';
    delBtn.addEventListener('click', ()=>{ state.ingredients.splice(idx,1); saveState(); renderInventory(); showToast('削除しました'); });
    rDiv.appendChild(badge); rDiv.appendChild(delBtn); top.appendChild(nameSpan); top.appendChild(rDiv);
    const bottom = document.createElement('div'); bottom.style.cssText='display:flex;align-items:center;gap:10px;flex-wrap:wrap;';
    const qc = document.createElement('div'); qc.className='qty-ctrl';
    const mb = document.createElement('button'); mb.className='qty-btn'; mb.textContent='−';
    mb.addEventListener('click',()=>{ state.ingredients[idx].qty=Math.max(0,Math.round((state.ingredients[idx].qty-1)*1000)/1000); saveState(); renderInventory(); });
    const qi = document.createElement('input'); qi.className='qty-input'; qi.type='number'; qi.min='0'; qi.step='0.001'; qi.value=fmt(ing.qty);
    qi.addEventListener('change',()=>{ const v=parseFloat(qi.value); if(!isNaN(v)&&v>=0){state.ingredients[idx].qty=Math.round(v*1000)/1000; saveState(); renderInventory();} });
    const gl = document.createElement('span'); gl.style.cssText='font-size:13px;color:#888;'; gl.textContent='g';
    const pb2 = document.createElement('button'); pb2.className='qty-btn'; pb2.textContent='＋';
    pb2.addEventListener('click',()=>{ state.ingredients[idx].qty=Math.round((state.ingredients[idx].qty+1)*1000)/1000; saveState(); renderInventory(); });
    qc.appendChild(mb); qc.appendChild(qi); qc.appendChild(gl); qc.appendChild(pb2);
    const bar = document.createElement('div'); bar.className='progress-bar';
    const fill = document.createElement('div'); fill.className=`progress-fill progress-${s}`; fill.style.width=pct+'%'; bar.appendChild(fill);
    const ml = document.createElement('span'); ml.style.cssText='font-size:12px;color:#888;white-space:nowrap;'; ml.textContent=`最低 ${fmt(ing.min)}g`;
    bottom.appendChild(qc); bottom.appendChild(bar); bottom.appendChild(ml);
    card.appendChild(top); card.appendChild(bottom); list.appendChild(card);
  });
}

function renderRecipes() {
  const list = document.getElementById('recipe-list');
  list.innerHTML = '';
  if (!state.recipes.length) { list.innerHTML='<div class="empty-state">レシピを追加してください</div>'; return; }
  state.recipes.forEach((rec, ridx) => {
    const flour = rec.flourBase||100;
    
    // 変更点2：「水」は無限在庫として扱う
    const canMake = rec.ingredients.every(ri=>{ 
      if (ri.name === '水') return true;
      const ing=state.ingredients.find(i=>i.name===ri.name); 
      return ing&&ing.qty>=flour*ri.pct/100; 
    });
    
    const card = document.createElement('div'); card.className='card';
    const header = document.createElement('div'); header.style.cssText='display:flex;align-items:center;justify-content:space-between;cursor:pointer;';
    const hL = document.createElement('div');
    const tEl = document.createElement('div'); t
