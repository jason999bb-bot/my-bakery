<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif; background: #fafaf8; color: #1a1a1a; min-height: 100vh; }
.container { max-width: 680px; margin: 0 auto; padding: 1rem; }
h1 { font-size: 18px; font-weight: 600; padding: 1rem 0 0.5rem; color: #3a2a1a; letter-spacing: 0.03em; }

.metric-num { font-size: 26px; font-weight: 600; color: #3a2a1a; }
.metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }

.badge-low { background: #fff3e0; color: #e65100; }
.badge-out { background: #fde8e8; color: #c62828; }
.progress-bar { flex: 1; height: 6px; background: #eee; border-radius: 999px; overflow: hidden; min-width: 40px; }
.progress-fill { height: 100%; border-radius: 999px; }
.progress-ok { background: #4caf50; }
.progress-low { background: #ff9800; }
.progress-out { background: #e53935; }
.btn { background: none; border: 1px solid #d0c8be; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; color: #3a2a1a; display: inline-flex; align-items: center; gap: 5px; font-family: inherit; }
.btn:hover { background: #f5f0e8; }
.btn-primary { background: #3a2a1a; color: #fff; border-color: #3a2a1a; }

.field label { font-size: 11px; color: #888; }

.link-btn { background: none; border: 1px solid #d0c8be; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; color: #3a2a1a; display: inline-flex; align-items: center; gap: 4px; font-family: inherit; }

.sync-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #888; margin-bottom: 12px; padding: 7px 12px; background: #f5f0e8; border-radius: 8px; }

.drag-handle { cursor: grab; touch-action: none; user-select: none; -webkit-user-select: none; color: #c0b6a8; font-size: 16px; padding: 0 6px; line-height: 1; flex-shrink: 0; }

.step-text { flex: 1; word-break: break-word; }
.name-edit-wrap { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
</style>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDYeTv14IRtpTCVrjcnk7I0wF-KCYoP0Os",
  authDomain: "bakery-53ea7.firebaseapp.com",
  projectId: "bakery-53ea7",
  storageBucket: "bakery-53ea7.firebasestorage.app",
  messagingSenderId: "212598766314",
  appId: "1:212598766314:web:86bef18fac3396e4c2b593"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const DOC_REF = doc(db, 'bakery', 'data');
let state = { ingredients: [], recipes: [], groups: [], ingredientGroups: [] };
let saving = false;
let editingRecipeId = null;
let editingIngredientId = null;
let editingGroupId = null;
let editingIngredientGroupId = null;
let openRecipeIds = new Set();

function genId() { return 'id_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function ensureIds() {
  state.groups = state.groups || [];
  state.groups.forEach(g => { if (!g.id) g.id = genId(); });
  state.ingredientGroups = state.ingredientGroups || [];
  state.ingredientGroups.forEach(g => { if (!g.id) g.id = genId(); });
  state.ingredients.forEach(i => { if (!i.id) i.id = genId(); if (i.groupId === undefined) i.groupId = null; });
  state.recipes.forEach(r => {
    if (!r.id) r.id = genId();
    if (r.groupId === undefined) r.groupId = null;
    if (!r.steps) r.steps = [];
  });
}
/* 汎用ドラッグ&ドロップ（マウス左クリック・スマホタッチ両対応、Pointer Eventsで統一） */
function attachDragHandle(handle, item, opts) {
  handle.addEventListener('pointerdown', (e) => {
    if (e.button !== undefined && e.button !== 0 && e.pointerType === 'mouse') return;
    e.preventDefault();
    item.classList.add('dragging');
    const onMove = (ev) => {
      const elBelow = document.elementFromPoint(ev.clientX, ev.clientY);
      const container = elBelow && elBelow.closest(opts.containerSelector);
      if (!container) return;
      const siblings = Array.from(container.children).filter(c => c !== item && c.classList.contains('sortable-item'));
      let inserted = false;
      for (const sib of siblings) {
        const rect = sib.getBoundingClientRect();
        if (ev.clientY < rect.top + rect.height / 2) { container.insertBefore(item, sib); inserted = true; break; }
      }
      if (!inserted) container.appendChild(item);
    };
    const onUp = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.removeEventListener('pointercancel', onUp);
      item.classList.remove('dragging');
      opts.onDrop(item);
    };
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);
  });
}

function fmt(n) {
  const num = parseFloat(n);
  if (isNaN(num) || num === 0) return '0';
  if (Number.isInteger(num)) return num.toString();
  return num.toPrecision(6).replace(/\.?0+$/, '');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function setSyncStatus(status, msg) {
  document.getElementById('sync-dot').className = 'sync-dot ' + status;
  document.getElementById('sync-status').textContent = msg;
}
async function saveState() {
  if (saving) return; saving = true;
  setSyncStatus('loading', '保存中…');
  try { await setDoc(DOC_REF, state); setSyncStatus('ok', 'Firebaseに保存済み ✓'); }
  catch(e) { setSyncStatus('err', '保存エラー'); showToast('保存に失敗しました: ' + e.message); }
  saving = false;
}
window.showTab = function(id) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['inventory','recipes','shop'][i]===id));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id==='shop') renderShop();
};
const INFINITE_INGREDIENTS = ['水'];
function isInfiniteIngredient(name) {
  return INFINITE_INGREDIENTS.includes(name);
}
function getStatus(qty, min) {
  if (qty<=0) return 'out';
  if (min>0 && qty<=min) return 'low';
  return 'ok';
}
function buildIngredientCard(ing) {
  const s = getStatus(ing.qty, ing.min);
  const pct = ing.min>0 ? Math.min(100,Math.round(ing.qty/ing.min*100)) : 100;
  const labels = {ok:'十分',low:'少ない',out:'在庫なし'};
  const card = document.createElement('div'); card.className='card sortable-item'; card.dataset.ingredientId=ing.id;
  const top = document.createElement('div'); top.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;';
  const nameWrap = document.createElement('div'); nameWrap.className='name-edit-wrap';
  const handle = document.createElement('span'); handle.className='drag-handle'; handle.textContent='⠿';
  nameWrap.appendChild(handle);
  if (editingIngredientId === ing.id) {
    const nameInput = document.createElement('input'); nameInput.type='text'; nameInput.value=ing.name; nameInput.style.cssText='font-size:13px;padding:5px 8px;border:1px solid #d0c8be;border-radius:8px;width:110px;font-family:inherit;';
    const saveNameBtn = document.createElement('button'); saveNameBtn.className='btn btn-primary'; saveNameBtn.style.cssText='font-size:11px;padding:4px 8px;'; saveNameBtn.textContent='保存';
    const cancelNameBtn = document.createElement('button'); cancelNameBtn.className='btn'; cancelNameBtn.style.cssText='font-size:11px;padding:4px 8px;'; cancelNameBtn.textContent='取消';
    saveNameBtn.addEventListener('click',()=>{
      const newName=nameInput.value.trim();
      if(!newName){showToast('材料名を入力してください');return;}
      if(newName!==ing.name && state.ingredients.find(i=>i.name===newName)){showToast('同じ名前の材料があります');return;}
      const oldName=ing.name;
      ing.name=newName;
      state.recipes.forEach(r=>r.ingredients.forEach(ri=>{ if(ri.name===oldName) ri.name=newName; }));
      editingIngredientId=null; saveState(); renderInventory(); renderRecipes(); showToast('材料名を更新しました');
    });
    cancelNameBtn.addEventListener('click',()=>{ editingIngredientId=null; renderInventory(); });
    nameWrap.appendChild(nameInput); nameWrap.appendChild(saveNameBtn); nameWrap.appendChild(cancelNameBtn);
  } else {
    const nameSpan = document.createElement('span'); nameSpan.style.cssText='font-weight:500;font-size:14px;cursor:pointer;'; nameSpan.title='クリックして編集'; nameSpan.textContent=ing.name;
    nameSpan.addEventListener('click',()=>{ editingIngredientId=ing.id; renderInventory(); });
    nameWrap.appendChild(nameSpan);
  }

function syncIngredientsFromDOM() {

    const gid = containerEl.dataset.groupId || '';
    Array.from(containerEl.children).forEach(child=>{
      if (!child.classList || !child.classList.contains('sortable-item')) return;
      const id = child.dataset.ingredientId;
      const ing = state.ingredients.find(i=>i.id===id);

function syncRecipesFromDOM() {

  list.innerHTML = '';
  if (!state.recipes.length && !state.groups.length) { list.innerHTML='<div class="empty-state">レシピを追加してください</div>'; return; }
  const groupsContainer = document.createElement('div'); groupsContainer.className='sortable-list-groups';
  state.groups.forEach((group, gidx)=>{
    const groupCard = document.createElement('div'); groupCard.className='group-card sortable-item'; groupCard.dataset.groupIndex=gidx; groupCard.dataset.groupId=group.id;
    const gHeader = document.createElement('div'); gHeader.className='group-header';
    const gHL = document.createElement('div'); gHL.style.cssText='display:flex;align-items:center;gap:4px;min-width:0;flex:1;';
    const gHandle = document.createElement('span'); gHandle.className='drag-handle'; gHandle.textContent='⠿';
    gHL.appendChild(gHandle);
    if (editingGroupId === group.id) {
      const gNameInput = document.createElement('input'); gNameInput.type='text'; gNameInput.value=group.name; gNameInput.style.cssText='font-size:13px;padding:5px 8px;border:1px solid #d0c8be;border-radius:8px;width:120px;font-family:inherit;';
      const gSaveBtn = document.createElement('button'); gSaveBtn.className='btn btn-primary'; gSaveBtn.style.cssText='font-size:11px;padding:4px 8px;'; gSaveBtn.textContent='保存';
      const gCancelBtn = document.createElement('button'); gCancelBtn.className='btn'; gCancelBtn.style.cssText='font-size:11px;padding:4px 8px;'; gCancelBtn.textContent='取消';
      gSaveBtn.addEventListener('click',()=>{
        const newName=gNameInput.value.trim();
        if(!newName){showToast('グループ名を入力してください');return;}
        group.name=newName; editingGroupId=null; saveState(); renderRecipes(); showToast('グループ名を更新しました');
      });
      gCancelBtn.addEventListener('click',()=>{ editingGroupId=null; renderRecipes(); });
      gHL.appendChild(gNameInput); gHL.appendChild(gSaveBtn); gHL.appendChild(gCancelBtn);
    } else {
      const gTitle = document.createElement('span'); gTitle.className='group-title'; gTitle.style.cursor='pointer'; gTitle.title='クリックして編集'; gTitle.textContent=group.name;
      gTitle.addEventListener('click', ()=>{ editingGroupId=group.id; renderRecipes(); });
      gHL.appendChild(gTitle);
    }
    const gDel = document.createElement('button'); gDel.className='btn btn-danger'; gDel.textContent='グループ削除';
    gDel.addEventListener('click', ()=>{
      state.recipes.forEach(r=>{ if(r.groupId===group.id) r.groupId=null; });
      state.groups = state.groups.filter(g=>g.id!==group.id);
      saveState(); renderRecipes(); showToast('グループを削除しました');
    });
    gHeader.appendChild(gHL); gHeader.appendChild(gDel);
    groupCard.appendChild(gHeader);
    const gList = document.createElement('div'); gList.className='sortable-list-recipes'; gList.dataset.groupId=group.id;
    const groupRecipes = state.recipes.filter(r=>r.groupId===group.id);
    groupRecipes.forEach(rec=> gList.appendChild(buildRecipeCard(rec)) );
    if (!groupRecipes.length) {
      const hint=document.createElement('div'); hint.className='group-drop-hint'; hint.textContent='ここにレシピをドラッグして追加';
      gList.appendChild(hint);
    }
    groupCard.appendChild(gList);
    groupsContainer.appendChild(groupCard);
    attachDragHandle(gHandle, groupCard, {
      containerSelector: '.sortable-list-groups',
      onDrop: () => {
        const newOrder = Array.from(groupsContainer.children).filter(el=>el.classList.contains('sortable-item')).map(el=>state.groups[parseInt(el.dataset.groupIndex)]);
        state.groups = newOrder; saveState(); renderRecipes();
      }
    });
  });
  list.appendChild(groupsContainer);
  const unSection = document.createElement('div');
  if (state.groups.length) {
    const uTitle=document.createElement('div'); uTitle.className='unclassified-title'; uTitle.textContent='未分類のレシピ';
    unSection.appendChild(uTitle);
  }
  const uList = document.createElement('div'); uList.className='sortable-list-recipes'; uList.dataset.groupId='';
  const unclassified = state.recipes.filter(r=>!r.groupId || !state.groups.find(g=>g.id===r.groupId));
  if (!unclassified.length && !state.recipes.length) {
    // nothing
  } else if (!unclassified.length) {
    const hint=document.createElement('div'); hint.className='group-drop-hint'; hint.textContent='ここにレシピをドラッグ';
    uList.appendChild(hint);
  } else {
    unclassified.forEach(rec=> uList.appendChild(buildRecipeCard(rec)) );
  }
  unSection.appendChild(uList);
  list.appendChild(unSection);
}
function renderShop() {
  const list=document.getElementById('shop-list');
  const items=state.ingredients.filter(i=>getStatus(i.qty,i.min)!=='ok');
  if(!items.length){list.innerHTML='<div class="empty-state">✅ 補充が必要な材料はありません</div>';return;}
  list.innerHTML='';
  items.forEach(ing=>{
    const needed=Math.max(0,ing.min-ing.qty);
    const card=document.createElement('div'); card.className='shop-card';
    const row=document.createElement('div'); row.style.cssText='display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;';
    const infoDiv=document.createElement('div');
    const nameDiv=document.createElement('div'); nameDiv.style.cssText='font-weight:500;font-size:14px;'; nameDiv.textContent=ing.name;
    const detailDiv=document.createElement('div'); detailDiv.style.cssText='font-size:12px;color:#888;margin-top:2px;'; detailDiv.textContent=`在庫 ${fmt(ing.qty)}g ／ 最低 ${fmt(ing.min)}g（不足 ${fmt(needed)}g）`;
    infoDiv.appendChild(nameDiv); infoDiv.appendChild(detailDiv);
    const actionDiv=document.createElement('div'); actionDiv.style.cssText='display:flex;gap:6px;';
    if (ing.link) {
      const linkBtn=document.createElement('button'); linkBtn.className='link-btn'; linkBtn.textContent='🔗 購入する';
      linkBtn.addEventListener('click',()=>window.open(ing.link,'_blank'));
      actionDiv.appendChild(linkBtn);
    } else {
      const noLink=document.createElement('span'); noLink.style.cssText='font-size:12px;color:#aaa;'; noLink.textContent='購入リンク未登録';
      actionDiv.appendChild(noLink);
    }
    row.appendChild(infoDiv); row.appendChild(actionDiv); card.appendChild(row);
    list.appendChild(card);
  });
}
function render(){renderInventory();renderRecipes();}
document.getElementById('add-ing-btn').addEventListener('click',()=>{
  const name=document.getElementById('new-name').value.trim();
  const qty=parseFloat(document.getElementById('new-qty').value)||0;
  const min=parseFloat(document.getElementById('new-min').value)||0;
  const link=document.getElementById('new-link').value.trim();
  if(!name)return;
  if(state.ingredients.find(i=>i.name===name)){showToast('同じ名前の材料があります');return;}
  state.ingredients.push({id:genId(),name,qty,min,link,groupId:null}); saveState(); renderInventory();
  ['new-name','new-qty','new-min','new-link'].forEach(id=>document.getElementById(id).value='');
});
document.getElementById('add-rec-btn').addEventListener('click',()=>{
  const name=document.getElementById('recipe-name').value.trim();
  const flour=parseFloat(document.getElementById('recipe-flour').value)||100;
  if(!name)return;
  state.recipes.push({id:genId(),name,flourBase:flour,groupId:null,ingredients:[],steps:[]}); saveState(); renderRecipes();
  document.getElementById('recipe-name').value='';
});
document.getElementById('add-ing-group-btn').addEventListener('click',()=>{
  const name=document.getElementById('ing-group-name').value.trim();
  if(!name)return;
  state.ingredientGroups.push({id:genId(),name});
  saveState(); renderInventory();
  document.getElementById('ing-group-name').value='';
});
document.getElementById('add-group-btn').addEventListener('click',()=>{
  const name=document.getElementById('group-name').value.trim();
  if(!name)return;
  state.groups.push({id:genId(),name});
  saveState(); renderRecipes();
  document.getElementById('group-name').value='';
});
document.getElementById('copy-shop-btn').addEventListener('click',()=>{
  const items=state.ingredients.filter(i=>getStatus(i.qty,i.min)!=='ok');
  if(!items.length){showToast('補充が必要な材料はありません');return;}
  navigator.clipboard.writeText('【購入リスト】\n'+items.map(i=>`・${i.name}：${fmt(Math.max(0,i.min-i.qty))}g不足`).join('\n'));
  showToast('コピーしました');
});
setSyncStatus('loading','Firebaseに接続中…');
onSnapshot(DOC_REF,(snap)=>{
  if(snap.exists()){const d=snap.data(); state.ingredients=d.ingredients||[]; state.recipes=d.recipes||[]; state.groups=d.groups||[]; state.ingredientGroups=d.ingredientGroups||[];}
  ensureIds();
  render(); setSyncStatus('ok','Firebaseと同期済み ✓');
},(err)=>{
  setSyncStatus('err','接続エラー: '+err.message);
  showToast('Firebase接続エラー: '+err.message);
});
</script>
</body>
